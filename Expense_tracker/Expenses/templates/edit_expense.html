{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/edit.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

</head>

<body>

    <div class="background-shape"></div>
    <div class="background-shape2"></div>

    <div class="edit-container">

        <div class="edit-card">

            <div class="edit-header">

                <h2>Edit Expense</h2>

                <p>Update your expense details below.</p>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Expense Title</label>

                    <input type="text" name="title" value="{{ expense.title }}" class="modern-input" required>

                </div>

                <div class="mb-3">

                    <label>Amount</label>

                    <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="modern-input"
                        required>

                </div>

                <div class="mb-3">

                    <label>Category</label>

                    <select name="category" class="modern-input">

                        <option value="Food" {% if expense.category == "Food" %}selected{% endif %}>Food</option>

                        <option value="Shopping" {% if expense.category == "Shopping" %}selected{% endif %}>Shopping
                        </option>

                        <option value="Travel" {% if expense.category == "Travel" %}selected{% endif %}>Travel</option>

                        <option value="Bills" {% if expense.category == "Bills" %}selected{% endif %}>Bills</option>

                        <option value="Entertainment" {% if expense.category == "Entertainment" %}selected{% endif %}>
                            Entertainment</option>

                        <option value="Other" {% if expense.category == "Other" %}selected{% endif %}>Other</option>

                    </select>
                </div>

                <div class="mb-4">

                    <label>Date</label>

                    <input type="date" name="date" value="{{ expense.date|date:'Y-m-d' }}" class="modern-input"
                        required>

                </div>

                <div class="button-group">

                    <a href="{% url 'home' %}" class="cancel-btn">

                        Cancel

                    </a>

                    <button class="save-btn">

                        <i class="bi bi-check-circle"></i>

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
