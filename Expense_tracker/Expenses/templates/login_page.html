{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

</head>

<body>

    <div class="background-shape"></div>
    <div class="background-shape2"></div>

    <div class="container py-5">
        {% include 'includes/messages.html' %}

        <div class="auth-card mx-auto">


            <!-- Logo -->

            <div class="text-center mb-5">

                <i class="bi bi-wallet2 auth-logo"></i>

                <h1 class="main-title mt-3">
                    Expense Tracker
                </h1>

                <p class="subtitle">
                    Track your daily spending with ease
                </p>

            </div>

            <!-- Heading -->

            <div class="text-center mb-4">

                <h2 class="section-title">
                    Welcome Back
                </h2>

                <p class="text-muted">
                    Login to continue
                </p>

            </div>

            <!-- Login Form -->

            <form method="POST">

                {% csrf_token %}

                <label class="form-label">
                    Username
                </label>

                <input type="text" name="username" class="modern-input w-100 mb-4" placeholder="Enter username"
                    required>

                <label class="form-label">
                    Password
                </label>

                <input type="password" name="password" class="modern-input w-100 mb-4" placeholder="Enter password"
                    required>

                <button type="submit" class="auth-btn add-btn">

                    <i class="bi bi-box-arrow-in-right me-2"></i>

                    Login

                </button>

            </form>

            <!-- Divider -->

            <div class="auth-divider">

                <span>OR</span>

            </div>

            <!-- Google -->

            <a href="{% provider_login_url 'google' process='login' %}" class="google-btn">
                <i class="bi bi-google"></i>
                Continue with Google
            </a>

            <div class="text-center mt-4">

                Don't have an account?

                <a href="{% url 'register' %}" class="register-link">

                    Create Account

                </a>

            </div>

        </div>

    </div>

</body>

</html>
